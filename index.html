<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Lecture slides and course tools for 2201NSC and 1020ENG.">
  <title>Lecture Slides and Tools</title>
  <style>
    :root {
      color-scheme: dark;
      --background: #080b10;
      --surface: #111722;
      --surface-hover: #172131;
      --text: #f5f7fb;
      --muted: #a8b3c3;
      --border: #293548;
      --accent: #63d8ff;
      --accent-soft: rgba(99, 216, 255, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 15% 5%, #14243c 0, transparent 30rem),
        var(--background);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system,
        BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(960px, calc(100% - 32px));
      margin: 0 auto;
      padding: clamp(48px, 8vw, 96px) 0;
    }

    header { margin-bottom: 44px; }

    h1 {
      margin: 0;
      font-size: clamp(2.4rem, 7vw, 4.8rem);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    header p {
      margin: 16px 0 0;
      color: var(--muted);
      font-size: 1.1rem;
    }

    .courses {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
    }

    section {
      padding: 26px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
    }

    h2 { margin: 0 0 8px; font-size: 1.55rem; }
    section p { margin: 0 0 22px; color: var(--muted); }
    .resource-links { display: grid; gap: 12px; }

    .resource-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 58px;
      padding: 14px 16px;
      color: var(--text);
      text-decoration: none;
      background: var(--accent-soft);
      border: 1px solid transparent;
      border-radius: 12px;
      transition: background 150ms ease, border-color 150ms ease,
        transform 150ms ease;
    }

    .resource-link:hover {
      background: var(--surface-hover);
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .resource-link:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 3px;
    }

    .resource-name { font-weight: 750; }

    .format {
      color: var(--accent);
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    footer { margin-top: 34px; color: var(--muted); font-size: 0.9rem; }

    @media (max-width: 680px) {
      .courses { grid-template-columns: 1fr; }
      section { padding: 21px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .resource-link { transition: none; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Lecture Slides and Tools</h1>
      <p>Select a course resource to open it.</p>
    </header>

    <div class="courses">
      <section aria-labelledby="course-2201nsc">
        <h2 id="course-2201nsc">2201NSC</h2>
        <p>Lecture slides and course tools</p>

        <nav class="resource-links" aria-label="2201NSC resources">
          <a class="resource-link" href="2201NSC/Week1Slides.pdf">
            <span class="resource-name">Week 1 slides</span>
            <span class="format">PDF</span>
          </a>
          <a class="resource-link" href="2201NSC/Week2slides.pdf">
            <span class="resource-name">Week 2 slides</span>
            <span class="format">PDF</span>
          </a>
          <a class="resource-link" href="2201NSC/matrixcalculator.html">
            <span class="resource-name">Matrix calculator</span>
            <span class="format">TOOL</span>
          </a>
        </nav>
      </section>

      <section aria-labelledby="course-1020eng">
        <h2 id="course-1020eng">1020ENG</h2>
        <p>Lecture slide collection</p>

        <nav class="resource-links" aria-label="1020ENG resources">
          <a class="resource-link" href="1020ENG/Week1Slides.pdf">
            <span class="resource-name">Week 1 slides</span>
            <span class="format">PDF</span>
          </a>
          <a class="resource-link" href="1020ENG/Week2slides.pdf">
            <span class="resource-name">Week 2 slides</span>
            <span class="format">PDF</span>
          </a>
        </nav>
      </section>
    </div>

    <footer>PDF files and tools open in the current browser tab.</footer>
  </main>
</body>
</html>
